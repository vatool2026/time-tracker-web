<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Preview</title>
  <style>
    body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; gap: 2rem; padding: 2rem; }
    .icon { width: 128px; height: 128px; }
  </style>
</head>
<body>
  <div>
    <h3>Default (Weiß)</h3>
    <img src="icons/icon-default.svg" class="icon" />
  </div>
  <div>
    <h3>Active (Grün)</h3>
    <img src="icons/icon-active.svg" class="icon" />
  </div>
  <div>
    <h3>Warning (Gelb)</h3>
    <img src="icons/icon-warning.svg" class="icon" />
  </div>
  <div>
    <h3>Violation (Rot)</h3>
    <img src="icons/icon-violation.svg" class="icon" />
  </div>
</body>
</html>
